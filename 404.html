<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>404 - Redirecting...</title>
    <script>
      (function () {
        // Get repo name
        const repoName = "theretailproject"; // <-- 🔁 replace with your repo name
        const currentPath = window.location.pathname;

        // If already at root path, don't redirect again
        if (!currentPath.endsWith("/" + repoName + "/")) {
          window.location.replace("/" + repoName + "/");
        }
      })();
    </script>
  </head>
  <body>
    <h1>Redirecting to homepage...</h1>
  </body>
</html>
